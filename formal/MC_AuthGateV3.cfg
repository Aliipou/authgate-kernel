\* TLC configuration for AuthGateV3 model checking
\* Run: java -jar tla2tools.jar -tool MC_AuthGateV3

SPECIFICATION MCSpec

\* Instantiate abstract constants with concrete finite values from MC_AuthGateV3.tla
CONSTANTS
  Actors      <- MCActors
  Resources   <- MCResources
  ProofHashes <- MCProofHashes
  PublicKeys  <- MCPublicKeys
  RootKey     <- MCRootKey
  MaxChainDepth <- MCMaxChainDepth
  MaxEpoch    <- MCMaxEpoch
  Hash        <- MCHash

\* State constraint: bound audit_log length to keep state space finite.
\* With 9 actions × 3 epochs × 5 revocations × 3 epoch advances,
\* limiting log to 3 entries keeps the state space checkable in minutes.
CONSTRAINT MCConstraint

\* Safety invariants to verify.
\* TLC checks: ∀ reachable state, each invariant holds.
INVARIANTS
  TypeInvariant
  EpochSafety
  IdentityBinding
  Attenuation
  RevocationSafety
  ResourceBinding
  ChainEpoch

\* No deadlock check — kernel state machine deliberately has
\* non-terminating loops (any state can always take another step).
CHECK_DEADLOCK FALSE
